openapi: 3.1.0
info:
  title: Vehicles API
  version: 1.0.0
tags:
  - name: vehicles
    description: Vehicle management

paths:
  /api/vehicles:
    post:
      summary: Create a vehicle
      description: Registers a new vehicle for the authenticated user's household.
      operationId: createVehicle
      security:
        - bearerAuth: [ ]
      tags:
        - vehicles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleCreationRequestPayload'
      responses:
        '201':
          description: Vehicle created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleCreationResponsePayload'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

    get:
      summary: List vehicles
      description: Returns all vehicles registered to the authenticated user's household.
      operationId: listVehicles
      security:
        - bearerAuth: [ ]
      tags:
        - vehicles
      responses:
        '200':
          description: Vehicles retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VehicleResponsePayload'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

  /api/vehicles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the vehicle
        schema:
          type: integer
          format: int64

    get:
      summary: Retrieve a specific vehicle by id
      operationId: getVehicle
      security:
        - bearerAuth: [ ]
      tags:
        - vehicles
      responses:
        '200':
          description: Vehicle retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleResponsePayload'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

    put:
      summary: Update a specific vehicle by id
      description: Replaces the mutable fields of an existing vehicle.
      operationId: updateVehicle
      security:
        - bearerAuth: [ ]
      tags:
        - vehicles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleUpdateRequestPayload'
      responses:
        '200':
          description: Vehicle updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleResponsePayload'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

    delete:
      summary: Delete a specific vehicle by id
      description: Decommissions a vehicle, removing it from the household.
      operationId: deleteVehicle
      security:
        - bearerAuth: [ ]
      tags:
        - vehicles
      responses:
        '204':
          description: Vehicle deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '404':
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    VehicleResponsePayload:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/VehicleType'
        year:
          type: integer
          format: int32
          example: 2023
        make:
          type: string
          example: "Toyota"
        model:
          type: string
          example: "Corolla"
        plate:
          type: string
          example: "CB1234AB"
        vin:
          type: string
          example: "JTDBR32E830000123"
        nickname:
          type: string
          example: "Daily driver"

    VehicleCreationRequestPayload:
      type: object
      required:
        - type
        - year
        - make
        - model
        - plate
        - vin
      properties:
        type:
          $ref: '#/components/schemas/VehicleType'
        year:
          type: integer
          format: int32
          example: 2023
        make:
          type: string
          example: "Toyota"
        model:
          type: string
          example: "Corolla"
        plate:
          type: string
          example: "CB1234AB"
        vin:
          type: string
          example: "JTDBR32E830000123"
        nickname:
          type: string
          example: "Daily driver"

    VehicleUpdateRequestPayload:
      type: object
      required:
        - type
        - year
        - make
        - model
        - plate
        - vin
      properties:
        type:
          $ref: '#/components/schemas/VehicleType'
        year:
          type: integer
          format: int32
          example: 2023
        make:
          type: string
          example: "Toyota"
        model:
          type: string
          example: "Corolla"
        plate:
          type: string
          example: "CB1234AB"
        vin:
          type: string
          example: "JTDBR32E830000123"
        nickname:
          type: string
          example: "Daily driver"

    VehicleCreationResponsePayload:
      type: object
      properties:
        id:
          type: integer
          format: int64

    VehicleType:
      type: string
      enum:
        - CAR
        - TRUCK
        - MOTORCYCLE
        - SUV
        - VAN
        - OTHER
      example: CAR

    ProblemDetailResponsePayload:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
          example: "about:blank"
        title:
          type: string
          example: "Not Found"
        status:
          type: integer
          example: 404
        instance:
          type: string
          example: "/api/vehicles/1"
        detail:
          type: string
          example: "The requested vehicle was not found."