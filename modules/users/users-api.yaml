openapi: 3.1.0
info:
  title: Users API
  version: 1.0.0
tags:
  - name: users
    description: User management

paths:
  /api/users/login:
    post:
      summary: User login
      description: Authenticates a user with a username and password, returning a JWT token if successful.
      operationId: login
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestPayload'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponsePayload'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

  /api/users:
    post:
      summary: Create a user
      operationId: createUser
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreationRequestPayload'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreationResponsePayload'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the user
        schema:
          type: integer
          format: int64

    delete:
      summary: Delete a specific user by id
      operationId: deleteUser
      security:
        - bearerAuth: [ ]
      tags:
        - users
      responses:
        '204':
          description: Flow deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

  /api/users/self:
    get:
      summary: Authenticated user details
      description: Retrieve user details
      operationId: authenticatedUser
      security:
        - bearerAuth: [ ]
      tags:
        - users
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponsePayload'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponsePayload'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequestPayload:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "emo"
        password:
          type: string
          format: password
          example: "nikolov"

    LoginResponsePayload:
      type: object
      properties:
        token:
          type: string
          description: JWT token to be used for authenticated requests
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.ZnkpUeZ5UoJ9czOTh..."

    UserResponsePayload:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum:
              - USER
              - ADMIN
            example: ADMIN

    UserCreationRequestPayload:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - roles
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum:
              - USER
              - ADMIN

    UserCreationResponsePayload:
      type: object
      properties:
        id:
          type: integer
          format: int64

    ProblemDetailResponsePayload:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
          example: "about:blank"
        title:
          type: string
          example: "Not Found"
        status:
          type: integer
          example: 404
        instance:
          type: string
          example: "/users/1"
        detail:
          type: string
          example: "The requested user was not found."